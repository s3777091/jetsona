# LightPanda web-search gateway.
# Additive only: attaches to the pre-existing `xiaozhi_default` network so it
# can reach the running `lightpanda` container (CDP 9222). Does NOT touch the
# lightpanda / orchestrator / K8s containers.
#
# GATEWAY_TOKEN is read from ./.env on the VM (not committed here).
services:
  lightpanda-search-gw:
    build: .
    container_name: lightpanda-search-gw
    restart: unless-stopped
    environment:
      GATEWAY_TOKEN: ${GATEWAY_TOKEN}
      PORT: 9233
    ports:
      - "9233:9233"
    networks:
      - xiaozhi_default

networks:
  xiaozhi_default:
    external: true