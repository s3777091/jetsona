# Jetson Nano fan control -- read every 2s by jetson-fan-curve.sh.
# Written by the DS-02 firmware (Settings > Cai dat chung > Quat).
#
# MODE=auto    follow the temperature curve of PROFILE
# MODE=manual  hold MANUAL_PWM
# MODE=off     stop the fan
#
# PROFILE=quiet     idle PWM 25 (~1450 rpm), ramps from 50 C
# PROFILE=balanced  idle PWM 45 (~2650 rpm), ramps from 46 C
# PROFILE=cool      idle PWM 90 (~5400 rpm), ramps from 42 C
MODE=auto
PROFILE=quiet
MANUAL_PWM=128
